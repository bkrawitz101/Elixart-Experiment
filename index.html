<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.A.L.O. Quantum Network Map</title>
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #b026ff;
            --bg: #030308;
            --panel: rgba(10, 10, 25, 0.7);
            --font-main: 'Segoe UI', Roboto, Helvetica, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 50%, #151530 0%, #030308 100%),
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            background: var(--panel);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 4px;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .logo-area span {
            color: var(--primary);
        }

        .network-status {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--secondary);
            text-align: right;
        }

        /* Main Network Canvas */
        #network-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
        }

        /* HTML Nodes overlaying canvas */
        #html-nodes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
        }

        .map-node {
            position: absolute;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Hover scales the cube, but not the whole div so label doesn't move weirdly */
        .map-node:hover .scene {
            transform: scale(1.3);
            z-index: 100;
        }

        /* 
           FIX: Ensure label is placed cleanly below the cube 
           and uses z-index so it renders on top. 
        */
        .node-label {
            margin-top: 15px; /* Adds space between cube and label */
            font-family: var(--font-mono);
            font-size: 12px;
            color: #fff;
            background: rgba(0, 0, 0, 0.85);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 200; /* Force label to front */
            position: relative;
            transition: all 0.2s;
        }

        .map-node:hover .node-label {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            color: var(--primary);
        }

        /* 3D CSS Cube for map nodes */
        .scene {
            width: 60px;
            height: 60px;
            perspective: 400px;
            position: relative; /* Changed from absolute to flow normally above label */
            transition: transform 0.2s;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 10s infinite linear;
        }

        .face {
            position: absolute;
            width: 40px;
            height: 40px;
            left: 10px;
            top: 10px;
            border: 2px solid;
            background: rgba(20, 20, 20, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.8;
            box-shadow: inset 0 0 10px currentColor;
        }

        .face.front  { transform: translateZ(20px); }
        .face.back   { transform: rotateY(180deg) translateZ(20px); }
        .face.right  { transform: rotateY(90deg) translateZ(20px); }
        .face.left   { transform: rotateY(-90deg) translateZ(20px); }
        .face.top    { transform: rotateX(90deg) translateZ(20px); }
        .face.bottom { transform: rotateX(-90deg) translateZ(20px); }

        .inner-cube {
            width: 20px;
            height: 20px;
            position: absolute;
            top: 20px;
            left: 20px;
            transform-style: preserve-3d;
            animation: rotateInner 6s infinite linear reverse;
        }

        .inner-face {
            position: absolute;
            width: 20px;
            height: 20px;
            background: currentColor;
            opacity: 0.9;
            box-shadow: 0 0 15px currentColor;
        }

        .inner-face.front  { transform: translateZ(10px); }
        .inner-face.back   { transform: rotateY(180deg) translateZ(10px); }
        .inner-face.right  { transform: rotateY(90deg) translateZ(10px); }
        .inner-face.left   { transform: rotateY(-90deg) translateZ(10px); }
        .inner-face.top    { transform: rotateX(90deg) translateZ(10px); }
        .inner-face.bottom { transform: rotateX(-90deg) translateZ(10px); }

        @keyframes rotateCube {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(180deg); }
        }

        @keyframes rotateInner {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(-360deg) rotateY(-360deg); }
        }

        /* UI Layer - Pushed down to bottom */
        .ui-layer {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 5;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            width: 320px;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(0, 243, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 11px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        /* Data Stream */
        .data-stream {
            font-family: var(--font-mono);
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            height: 100px;
            overflow: hidden;
            line-height: 1.5;
        }

        .data-line { margin-bottom: 4px; }
        .pulse-text { color: var(--primary); text-shadow: 0 0 5px var(--primary); font-weight: bold; }
        .anomaly-text { color: var(--secondary); text-shadow: 0 0 5px var(--secondary); font-weight: bold; }

        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .metric-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 8px;
            text-align: center;
            border-radius: 4px;
        }

        .metric-label { font-size: 9px; color: #aaa; text-transform: uppercase;}
        .metric-val { color: var(--primary); font-weight: bold; font-size: 16px; font-family: var(--font-mono); margin-top: 3px;}

        button {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 11px;
            width: 100%;
        }

        button:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 15px var(--primary);
        }

        /* Node info popup */
        #node-info {
            position: absolute;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--secondary);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-family: var(--font-mono);
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 20;
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.4);
            transform: translate(-50%, -120%);
        }

        .node-info-title { color: var(--secondary); font-size: 14px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase;}
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>H.A.L.O. <span>QUANTUM MAP</span></h1>
        </div>
        <div class="network-status">
            GLOBAL COHERENCE: <span style="color:#0f0">STABLE</span><br>
            ACTIVE Q-NODES: 5/5
        </div>
    </header>

    <div id="network-canvas-container">
        <canvas id="networkCanvas"></canvas>
    </div>

    <div id="html-nodes-container">
        <!-- 3D Cubes will be injected here by JS -->
    </div>

    <!-- Hover Info Box -->
    <div id="node-info">
        <div class="node-info-title" id="ni-title">Node Name</div>
        <div>STATUS: <span style="color:#0f0">ONLINE</span></div>
        <div>LOCAL Z-SCORE: <span id="ni-zscore">1.2</span></div>
        <div>QREG ENTROPY: <span id="ni-entropy">High</span></div>
    </div>

    <!-- UI Panels Moved to Bottom -->
    <div class="ui-layer">
        <!-- Left Panel: Metrics -->
        <div class="panel">
            <h2>Network Telemetry</h2>
            <div class="metrics-grid">
                <div class="metric-box">
                    <div class="metric-label">Total Entanglement</div>
                    <div class="metric-val" id="totEnt">94.2%</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Field Coherence</div>
                    <div class="metric-val" id="fldCoh">0.89</div>
                </div>
            </div>
            <button id="pulseBtn">Initiate Global Pulse (Elixart Node)</button>
        </div>

        <!-- Right Panel: Data Stream -->
        <div class="panel" style="width: 400px;">
            <h2>Real-Time QREG Stream</h2>
            <div class="data-stream" id="dataStream">
                <div class="data-line">Initializing multi-node connection...</div>
                <div class="data-line">Establishing quantum handshake...</div>
            </div>
        </div>
    </div>

    <script>
        // Data and Logic
        const nodes = [
            { id: 'SF', name: 'Exploratorium', city: 'San Francisco', color: '#e74c3c', x: 0.2, y: 0.4 },
            { id: 'NV', name: 'Elixart', city: 'Nevada City', color: '#b026ff', x: 0.35, y: 0.25 },
            { id: 'RN', name: 'The Discovery', city: 'Reno', color: '#f1c40f', x: 0.5, y: 0.35 },
            { id: 'PX', name: 'AZ Science Center', city: 'Phoenix', color: '#e67e22', x: 0.65, y: 0.65 },
            { id: 'EP', name: 'La Nube', city: 'El Paso', color: '#2ecc71', x: 0.85, y: 0.75 }
        ];

        let connections = [];
        for(let i=0; i<nodes.length; i++) {
            for(let j=i+1; j<nodes.length; j++) {
                connections.push({
                    from: nodes[i],
                    to: nodes[j],
                    strength: Math.random() * 0.5 + 0.1, 
                    particles: [] 
                });
            }
        }

        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        const htmlNodesContainer = document.getElementById('html-nodes-container');
        const nodeInfo = document.getElementById('node-info');

        let width, height;

        function createNodes() {
            htmlNodesContainer.innerHTML = '';

            nodes.forEach((node, index) => {
                const nodeEl = document.createElement('div');
                nodeEl.className = 'map-node';
                nodeEl.id = 'node-' + index;

                const col = node.color;

                nodeEl.innerHTML = `
                    <div class="scene" style="color: ${col};">
                        <div class="cube" id="cube-${index}">
                            <div class="face front" style="border-color:${col};"></div>
                            <div class="face back" style="border-color:${col};"></div>
                            <div class="face right" style="border-color:${col};"></div>
                            <div class="face left" style="border-color:${col};"></div>
                            <div class="face top" style="border-color:${col};"></div>
                            <div class="face bottom" style="border-color:${col};"></div>

                            <div class="inner-cube">
                                <div class="inner-face front" style="background:${col};"></div>
                                <div class="inner-face back" style="background:${col};"></div>
                                <div class="inner-face right" style="background:${col};"></div>
                                <div class="inner-face left" style="background:${col};"></div>
                                <div class="inner-face top" style="background:${col};"></div>
                                <div class="inner-face bottom" style="background:${col};"></div>
                            </div>
                        </div>
                    </div>
                    <div class="node-label">${node.name}</div>
                `;

                nodeEl.addEventListener('mouseenter', (e) => {
                    const rect = nodeEl.getBoundingClientRect();
                    nodeInfo.style.opacity = 1;
                    nodeInfo.style.left = (rect.left + rect.width/2) + 'px';
                    nodeInfo.style.top = (rect.top - 10) + 'px';
                    document.getElementById('ni-title').innerText = node.name + ' (' + node.city + ')';
                    document.getElementById('ni-zscore').innerText = (1.0 + Math.random() * 1.5).toFixed(2);
                });

                nodeEl.addEventListener('mouseleave', () => {
                    nodeInfo.style.opacity = 0;
                });

                htmlNodesContainer.appendChild(nodeEl);
            });
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            nodes.forEach((node, index) => {
                const el = document.getElementById('node-' + index);
                if(el) {
                    el.style.left = (node.x * width) + 'px';
                    el.style.top = (node.y * height) + 'px';
                }
            });
        }

        createNodes();
        window.addEventListener('resize', resize);
        resize();

        let frame = 0;
        let globalPulseActive = false;
        let pulseRadius = 0;
        let pulseOrigin = {x:0, y:0};

        function animate() {
            frame++;
            ctx.clearRect(0, 0, width, height);

            connections.forEach(conn => {
                const x1 = conn.from.x * width;
                const y1 = conn.from.y * height;
                const x2 = conn.to.x * width;
                const y2 = conn.to.y * height;

                const currentStrength = conn.strength + Math.sin(frame * 0.05 + conn.from.x * 10) * 0.2;
                const alpha = Math.max(0.1, Math.min(0.8, currentStrength));

                ctx.beginPath();
                ctx.moveTo(x1, y1);

                const cx = (x1 + x2) / 2;
                const cy = (y1 + y2) / 2 - 50; 
                ctx.quadraticCurveTo(cx, cy, x2, y2);

                if (globalPulseActive) {
                    ctx.strokeStyle = `rgba(0, 243, 255, ${alpha + 0.4})`;
                    ctx.lineWidth = 2;
                } else {
                    const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
                    gradient.addColorStop(0, conn.from.color);
                    gradient.addColorStop(1, conn.to.color);
                    ctx.strokeStyle = gradient;
                    ctx.globalAlpha = alpha;
                    ctx.lineWidth = 1;
                }
                ctx.stroke();
                ctx.globalAlpha = 1.0;

                if (Math.random() < 0.03) {
                    conn.particles.push({ 
                        progress: 0, 
                        speed: Math.random() * 0.01 + 0.005, 
                        dir: Math.random() > 0.5 ? 1 : -1,
                        color: Math.random() > 0.5 ? conn.from.color : conn.to.color
                    });
                }

                for (let i = conn.particles.length - 1; i >= 0; i--) {
                    let p = conn.particles[i];
                    p.progress += p.speed;

                    if (p.progress >= 1) {
                        conn.particles.splice(i, 1);
                        continue;
                    }

                    const t = p.dir === 1 ? p.progress : 1 - p.progress;
                    const px = Math.pow(1-t, 2)*x1 + 2*(1-t)*t*cx + Math.pow(t, 2)*x2;
                    const py = Math.pow(1-t, 2)*y1 + 2*(1-t)*t*cy + Math.pow(t, 2)*y2;

                    ctx.beginPath();
                    ctx.arc(px, py, 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = globalPulseActive ? '#00f3ff' : p.color;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });

            if (globalPulseActive) {
                pulseRadius += 20;
                ctx.beginPath();
                ctx.arc(pulseOrigin.x, pulseOrigin.y, pulseRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 243, 255, ${Math.max(0, 1 - pulseRadius/(width*0.8))})`;
                ctx.lineWidth = 5;
                ctx.stroke();

                if (pulseRadius > width * 1.2) {
                    globalPulseActive = false;
                    nodes.forEach((node, index) => {
                        const cube = document.getElementById('cube-' + index);
                        if(cube) {
                            const faces = cube.querySelectorAll('.face');
                            faces.forEach(f => f.style.background = 'rgba(20, 20, 20, 0.6)');
                            cube.style.animationDuration = '10s';
                        }
                    });
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

        const streamDiv = document.getElementById('dataStream');
        function addDataLine(text, type='normal') {
            const line = document.createElement('div');
            line.className = 'data-line ' + (type === 'pulse' ? 'pulse-text' : (type === 'anomaly' ? 'anomaly-text' : ''));
            const time = new Date().toISOString().substring(11, 19);
            line.innerHTML = `[${time}] ${text}`;
            streamDiv.appendChild(line);
            if(streamDiv.childNodes.length > 6) streamDiv.removeChild(streamDiv.firstChild);
            streamDiv.scrollTop = streamDiv.scrollHeight;
        }

        setInterval(() => {
            if(Math.random() > 0.6) {
                const node = nodes[Math.floor(Math.random() * nodes.length)];
                const msg = `SYNC: ${node.id} >> Q-variance mapped.`;
                addDataLine(msg);
            }
            if(Math.random() > 0.95) {
                addDataLine(`ENTANGLEMENT SPIKE DETECTED`, 'anomaly');
            }
            document.getElementById('totEnt').innerText = (90 + Math.random() * 9).toFixed(1) + '%';
            document.getElementById('fldCoh').innerText = (0.8 + Math.random() * 0.19).toFixed(2);
        }, 1500);

        document.getElementById('pulseBtn').addEventListener('click', () => {
            const nvNode = nodes[1];
            pulseOrigin = { x: nvNode.x * width, y: nvNode.y * height };
            pulseRadius = 0;
            globalPulseActive = true;

            nodes.forEach((node, index) => {
                const cube = document.getElementById('cube-' + index);
                if(cube) {
                    const faces = cube.querySelectorAll('.face');
                    faces.forEach(f => f.style.background = 'rgba(255, 255, 255, 0.5)');
                    cube.style.animationDuration = '2s';
                }
            });

            addDataLine(`>>> NETWORK OVERRIDE: GLOBAL RESONANCE PULSE INITIATED FROM ELIXART <<<`, 'pulse');
        });

    </script>
</body>
</html>
